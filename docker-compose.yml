services:
  influxdb:
    image: influxdb:latest
    volumes:
      - influxdb-storage:/var/lib/influxdb2:rw
    env_file:
      - .env
    entrypoint: ["./entrypoint.sh"]
    restart: on-failure:10
    ports:
      - ${DOCKER_INFLUXDB_INIT_PORT}:8086
    networks:
      net:
        ipv4_address: 192.68.0.21

  adaptor:
    build: adaptor
    volumes:
      - adaptor-storage:/var/lib/adaptor:rw
    links:
      - influxdb
    depends_on:
      - influxdb
    ports:
      - 8080:8080
    networks:
      net:
        ipv4_address: 192.68.0.25

  registry:
    build: registry
    volumes:
      - registry-storage:/var/lib/registry:rw
    ports:
      - 8081:8081
    restart: always
    networks:
      net:
        ipv4_address: 192.68.0.24

  pub_simulator:
    build: pubsimulator
    depends_on:
      - adaptor
    restart: always
    networks:
      net:
        ipv4_address: 192.68.0.26

  capetti:
    build:
      context: ./capetti_devices
      dockerfile: Dockerfile
    depends_on:
      - adaptor
    restart: always
    networks:
      net:
        ipv4_address: 192.68.0.27

  netatmo:
    build:
      context: ./netatmo_devices
      dockerfile: Dockerfile.dockerfile
    depends_on:
      - registry
      - adaptor
    restart: always
    networks:
      net:
        ipv4_address: 192.68.0.28
  
  plot_service:
    build: ./technical_graphs  
    depends_on:
      - adaptor
    ports:
      - 9090:9090
    networks:
      net:
        ipv4_address: 192.68.0.29


volumes:
  influxdb-storage:
  adaptor-storage:
  registry-storage:

networks:
  net:
    ipam: 
      driver: default
      config:
        - subnet: "192.68.0.0/24"