<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Service Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .column {
            margin-bottom: 30px;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"], select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        #jsonDisplay {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            font-family: monospace;
            white-space: pre-wrap;
            overflow-x: auto;
        }
        /* Header Styles */
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .logo {
            max-width: 30%;
            height: auto;
        }
    </style>
</head>
<body>
       <!-- Header Section -->
    <div class="header">
        <img src="logo.png" alt="IEQ Middleware Logo" class="logo">
    </div>

    <div class="container">
        <!-- Add User -->
        <div class="column">
            <h2>Add user</h2>
            <div class="row">
                <input type="text" id="input1_col1" placeholder="UserId">
                <input type="text" id="input2_col1" placeholder="Password">
            </div>
            <div class="row">
                <select id="permission_col1">
                    <option value="Base">Base</option>
                    <option value="Technical">Technical</option>
                </select>
                <button onclick="postAddUser(1)">Submit</button>
            </div>
        </div>

        <!-- Add Apartment -->
        <div class="column">
            <h2>Add apartment</h2>
            <div class="row">
                <input type="text" id="input1_col2" placeholder="UserId">
                <input type="text" id="input2_col2" placeholder="Apartment Name">
            </div>
            <div class="row">
                <input type="text" id="input3_col2" placeholder="Longitude">
                <input type="text" id="input4_col2" placeholder="Latitude">
            </div>
            <div class="row">
                <select id="apartmentType" style="width: 100%;">
                    <option value="House">House</option>
                    <option value="School">School</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div id="roomsContainer"></div>
            <div class="button-container">
                <button onclick="addRoomInput()">Add Room</button>
            </div>
            <h3>Gateways</h3>
            <div id="gatewaysContainer">
                <div class="row gateway">
                    <select class="gatewayType">
                        <option value="capetti">Capetti</option>
                        <option value="netatmo">Netatmo</option>
                    </select>
                    <input type="text" class="gatewayMAC" placeholder="MAC Address">
                </div>
            </div>
            <div class="button-container">
                <button onclick="addGatewayInput()">Add Gateway</button>
                <button onclick="postAddApartment(2)">Submit</button>
            </div>
        </div>

        <!-- Update Tokens -->
        <div class="column">
            <h2>Update Gateway Tokens</h2>
            <div class="row">
                <input type="text" id="updateApartmentId" placeholder="ApartmentId">
                <input type="text" id="updateGatewayMAC" placeholder="Gateway MAC">
            </div>
            <div class="row">
                <input type="text" id="updateAccessToken" placeholder="Access Token">
                <input type="text" id="updateRefreshToken" placeholder="Refresh Token">
            </div>
            <div class="row">
                <button onclick="postUpdateTokens()">Submit</button>
            </div>
        </div>

        <!-- Add User to Apartment -->
        <div class="column">
            <h2>Add User to Apartment</h2>
            <div class="row">
                <input type="text" id="input1_col5" placeholder="UserId">
                <input type="text" id="input2_col5" placeholder="ApartmentId">
            </div>
            <div class="row">
                <button onclick="postAddUserToApartment(5)">Submit</button>
            </div>
        </div>

        <!-- Remove User -->
        <div class="column">
            <h2>Remove user</h2>
            <div class="row">
                <input type="text" id="input1_col3" placeholder="UserId">
                <button onclick="postRemoveUser(3)">Submit</button>
            </div>
        </div>

        <!-- Remove Apartment -->
        <div class="column">
            <h2>Remove apartment</h2>
            <div class="row">
                <input type="text" id="input1_col4" placeholder="ApartmentId">
                <button onclick="postRemoveApartment(4)">Submit</button>
            </div>
        </div>
    </div>

    <div id="jsonDisplay"></div>
    <button onclick="fetchData()" style="display: block; margin: 20px auto; padding: 10px 20px;">Get Users</button>

    <script>
        const BASE_URL = "https://registry.ieqmiddleware.com";
    
        // Function to add new room with dynamic sensor inputs
        function addRoomInput() {
            const container = document.getElementById("roomsContainer");
            const div = document.createElement("div");
            div.classList.add("room");
            div.innerHTML = `
                <div class="row">
                    <input type="text" class="roomId" placeholder="Room ID">
                    <button onclick="addSensorInput(this)">Add Sensor</button>
                </div>
                <div class="sensorContainer"></div>
            `;
            container.appendChild(div);
        }
    
        function addSensorInput(button) {
            const sensorContainer = button.parentElement.nextElementSibling;
            const sensorDiv = document.createElement("div");
            sensorDiv.classList.add("row");
            sensorDiv.style.marginTop = "10px";
            sensorDiv.innerHTML = `
                <input type="text" class="sensorName" placeholder="Sensor Name">
                <div style="display: flex; flex-direction: column; max-height: 100px; overflow-y: auto; border: 1px solid #ccc; padding: 5px; border-radius: 4px;">
                    <label><input type="checkbox" class="measurement" value="Temperature"> Temperature</label>
                    <label><input type="checkbox" class="measurement" value="Humidity"> Humidity</label>
                    <label><input type="checkbox" class="measurement" value="Pressure"> Pressure</label>
                    <label><input type="checkbox" class="measurement" value="CO2"> CO2</label>
                    <label><input type="checkbox" class="measurement" value="VOC"> VOC</label>
                    <label><input type="checkbox" class="measurement" value="PM10.0"> PM10.0</label>
                    <label><input type="checkbox" class="measurement" value="PM2.5"> PM2.5</label>
                </div>
            `;
            sensorContainer.appendChild(sensorDiv);
        }
    
        function addGatewayInput() {
            const container = document.getElementById("gatewaysContainer");
            const div = document.createElement("div");
            div.classList.add("row", "gateway");
            div.innerHTML = `
                <select class="gatewayType">
                    <option value="capetti">Capetti</option>
                    <option value="netatmo">Netatmo</option>
                </select>
                <input type="text" class="gatewayMAC" placeholder="MAC Address">
            `;
            container.appendChild(div);
        }
    
        function postAddApartment(columnNumber) {
            const userId = document.getElementById(`input1_col${columnNumber}`).value;
            const apartmentName = document.getElementById(`input2_col${columnNumber}`).value;
            const longitude = document.getElementById(`input3_col${columnNumber}`).value;
            const latitude = document.getElementById(`input4_col${columnNumber}`).value;
            const apartmentType = document.getElementById("apartmentType").value;
    
            const rooms = [];
            document.querySelectorAll(".room").forEach(roomDiv => {
                const roomId = roomDiv.querySelector(".roomId").value;
                const sensors = [];
                roomDiv.querySelectorAll(".sensorContainer .row").forEach(sensorRow => {
                    const sensorId = sensorRow.querySelector(".sensorName").value;
                    const measurements = Array.from(sensorRow.querySelectorAll(".measurement:checked")).map(cb => cb.value);
                    if (sensorId && measurements.length > 0) {
                        sensors.push({ sensorId, measurements });
                    }
                });
                if (roomId) {
                    rooms.push({ roomId, sensors });
                }
            });
    
            const gateways = [];
            document.querySelectorAll(".gateway").forEach(gatewayDiv => {
                const gatewayType = gatewayDiv.querySelector(".gatewayType").value;
                const gatewayMAC = gatewayDiv.querySelector(".gatewayMAC").value;
                if (gatewayMAC) {
                    if (gatewayType === "netatmo") {
                        gateways.push({ name: gatewayType, MAC: gatewayMAC, accessToken: "", refreshToken: "" });
                    } else {
                        gateways.push({ name: gatewayType, MAC: gatewayMAC });
                    }
                }
            });
    
            const payload = {
                MAC: gateways,
                apartmentName: apartmentName,
                coordinates: {
                    long: parseFloat(longitude),
                    lat: parseFloat(latitude)
                },
                type: apartmentType,
                userId: userId,
                rooms: rooms
            };
    
            fetch(`${BASE_URL}/add_apt`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => response.ok ? response.json() : Promise.reject('Failed to submit data.'))
            .then(data => {
                alert(data.status === 'OK' ? 'Data submitted successfully!' : `Data submission failed. Message: ${data.message}`);
            })
            .catch(error => alert(error));
        }
    
        function postAddUserToApartment(columnNumber) {
            const userId = document.getElementById(`input1_col${columnNumber}`).value;
            const apartmentId = document.getElementById(`input2_col${columnNumber}`).value;
            fetch(`${BASE_URL}/add_user_to_apartment`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, apartmentId })
            }).then(response => response.ok ? response.json() : Promise.reject())
             .then(data => alert(data.status === 'OK' ? 'Success' : 'Fail'))
             .catch(() => alert('Error'));
        }
    
        function postAddUser(columnNumber) {
            const userId = document.getElementById(`input1_col${columnNumber}`).value;
            const password = document.getElementById(`input2_col${columnNumber}`).value;
            const permission = document.getElementById(`permission_col${columnNumber}`).value;
            fetch(`${BASE_URL}/add_user`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, password, permission })
            }).then(response => response.ok ? response.json() : Promise.reject())
             .then(data => alert(data.status === 'OK' ? 'Success' : 'Fail'))
             .catch(() => alert('Error'));
        }
    
        function postUpdateTokens() {
            const apartmentId = document.getElementById("updateApartmentId").value;
            const gatewayMAC = document.getElementById("updateGatewayMAC").value;
            const accessToken = document.getElementById("updateAccessToken").value;
            const refreshToken = document.getElementById("updateRefreshToken").value;
            fetch(`${BASE_URL}/update_tokens`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ apartmentId, gatewayMAC, accessToken, refreshToken })
            }).then(response => response.ok ? response.json() : Promise.reject())
             .then(data => alert(data.status === 'OK' ? 'Success' : 'Fail'))
             .catch(() => alert('Error'));
        }
    
        function postRemoveUser(columnNumber) {
            const input1 = document.getElementById(`input1_col${columnNumber}`).value;
            fetch(`${BASE_URL}/del_user/${input1}`, {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'}
            }).then(response => response.ok ? response.json() : Promise.reject())
             .then(data => alert(data.status === 'OK' ? 'Success' : 'Fail'))
             .catch(() => alert('Error'));
        }
    
        function postRemoveApartment(columnNumber) {
            const aptId = document.getElementById(`input1_col${columnNumber}`).value;
            fetch(`${BASE_URL}/del_apt/${aptId}`, {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'}
            }).then(response => response.ok ? response.json() : Promise.reject())
             .then(data => alert(data.status === 'OK' ? 'Success' : 'Fail'))
             .catch(() => alert('Error'));
        }
    
        function fetchData() {
            fetch(`${BASE_URL}/users`)
              .then(response => response.json())
              .then(data => {
                  document.getElementById('jsonDisplay').textContent = JSON.stringify(data, null, 2);
              })
              .catch(() => alert('Fetch failed'));
        }
    </script>
</body>
</html>
